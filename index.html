---
layout: home
full-width: true
title: SHIBUI
subtitle: The future of events
cover-img: /assets/img/cover.jpg
---


<div class="row">
    <div class="col m-5" style="text-align: center;">
        <h1>Timeline</h1>
    </div>
</div>

<div class="row">
    <div class="col-md-10 offset-md-1">
        <ul class="timeline timeline-centered">
            {% for doc in site.docs %}
            <li class="timeline-item">
                <div class="timeline-info">
                    <span>{{ doc.date | date: "%B %-d, %Y" }}</span>
                </div>
                <div class="timeline-marker"></div>
                <div class="timeline-content">
                    <h3 class="timeline-title"><a href="{{ doc.url }}">{{ doc.title }}</a></h3>
                    <p>{{ doc.description }}</p>
                </div>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
